<div class="setup-container">
  <div class="header">
    <div class="brand">
      <span class="logo">⚡</span>
      <h1>RemoteAssistant Setup</h1>
    </div>
    <a routerLink="/dashboard" class="btn-nav">← Back to Dashboard</a>
  </div>

  <div class="setup-grid">
    <!-- Telegram Configuration -->
    <div class="card glass">
      <div class="card-header">
        <span class="step-num">1</span>
        <h2>Telegram Bot Config</h2>
        <span class="badge" [ngClass]="status.hasTelegramBotToken ? 'success' : 'warning'">
          {{ status.hasTelegramBotToken ? 'Connected' : 'Missing' }}
        </span>
      </div>
      <p class="description">Paste your Telegram Bot Token generated from &#64;BotFather. This enables the bot to handle user registrations.</p>
      
      <div class="form-group">
        <label for="telegramToken">Bot Token</label>
        <input 
          type="password" 
          id="telegramToken" 
          [(ngModel)]="telegramToken" 
          placeholder="e.g. 123456789:ABCdefGhIJKlmNoPQRsTUVwxyZ"
          class="form-control"
        />
      </div>

      <button (click)='saveTelegram()' class="btn btn-primary">Save Bot Token</button>
      <div *ngIf="telegramMessage" class="alert" [ngClass]="telegramError ? 'alert-danger' : 'alert-success'">
        {{ telegramMessage }}
      </div>
    </div>

  </div>
</div>
